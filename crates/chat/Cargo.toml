[package]
name = "praxis-chat"
version = "0.1.1"
edition = "2024"
authors = ["i-am-logger"]
description = "Praxis chat engine — shared logic for CLI and WASM"
license = "CC-BY-NC-SA-4.0"

[dependencies]
praxis = { path = "../praxis" }
praxis-domains = { path = "../domains" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "chat_benchmarks"
harness = false
