name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Format
            command: cargo fmt --check
          - name: Clippy
            command: cargo clippy -- -D warnings
          - name: Test
            command: cargo test --workspace
            rustflags: "-D warnings"
          - name: Coverage
            command: cargo llvm-cov --workspace --lcov --output-path lcov.info
            master-only: true
          - name: Test Results
            command: cargo nextest run --workspace --profile ci
            master-only: true
    steps:
      - uses: actions/checkout@v4
        if: "!matrix.master-only || (github.event_name == 'push' && github.ref == 'refs/heads/master')"
        with:
          lfs: true
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        if: "!matrix.master-only || (github.event_name == 'push' && github.ref == 'refs/heads/master')"
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        if: "!matrix.master-only || (github.event_name == 'push' && github.ref == 'refs/heads/master')"
      - uses: taiki-e/install-action@cargo-llvm-cov
        if: matrix.name == 'Coverage' && github.event_name == 'push' && github.ref == 'refs/heads/master'
      - uses: taiki-e/install-action@cargo-nextest
        if: matrix.name == 'Test Results' && github.event_name == 'push' && github.ref == 'refs/heads/master'
      - name: Run ${{ matrix.name }}
        if: "!matrix.master-only || (github.event_name == 'push' && github.ref == 'refs/heads/master')"
        run: ${{ matrix.command }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags || '' }}
      - name: Upload coverage to Codecov
        if: matrix.name == 'Coverage' && github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: matrix.name == 'Test Results' && github.event_name == 'push' && github.ref == 'refs/heads/master' && !cancelled()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results

  pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: |
          cd crates/wasm
          wasm-pack build --target web --release
      - name: Build presentation
        run: npx @marp-team/marp-cli docs/presentations/overview.md --html -o docs/presentations/index.html
      - name: Assemble pages
        run: |
          mkdir -p pages/pkg pages/decks/technical
          cp docs/chat/index.html pages/index.html
          cp -r crates/wasm/pkg/* pages/pkg/
          cp docs/presentations/index.html pages/decks/technical/index.html
          cp docs/praxis-logo-dark.jpg pages/praxis-logo-dark.jpg
          cp docs/praxis-logo-light.jpg pages/praxis-logo-light.jpg
          cp docs/praxis-logo-video-dark.mp4 pages/praxis-logo-video-dark.mp4
          cp docs/praxis-logo-video-light.mp4 pages/praxis-logo-video-light.mp4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release-please:
    name: Release
    runs-on: ubuntu-latest
    needs: [check]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.check.result == 'success'
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          ignore-unpublished-changes: true
          publish-delay: 10000
