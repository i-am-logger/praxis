name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Lint/UT
    runs-on: ubuntu-latest
    if: |
      !(
        (github.event_name == 'pull_request' && (startsWith(github.event.pull_request.title, 'release:') || startsWith(github.event.pull_request.title, 'chore: release'))) ||
        (github.event_name == 'push' && (contains(github.event.head_commit.message, 'release-please--branches--master') || startsWith(github.event.head_commit.message, 'chore: release')))
      )
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Tests
        run: cargo test --workspace
        env:
          RUSTFLAGS: "-D warnings"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  release-please:
    name: Release
    runs-on: ubuntu-latest
    needs: [check, coverage]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      (needs.check.result == 'success' || needs.check.result == 'skipped') &&
      (needs.coverage.result == 'success' || needs.coverage.result == 'skipped')
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces
      - name: Publish all crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo workspaces publish --from-git --token "$CARGO_REGISTRY_TOKEN"
