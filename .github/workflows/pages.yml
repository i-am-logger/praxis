name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: |
          cd crates/wasm
          wasm-pack build --target web --release

      - name: Build presentation
        run: npx @marp-team/marp-cli docs/presentations/overview.md --html -o docs/presentations/index.html

      - name: Assemble pages
        run: |
          mkdir -p pages/pkg pages/decks/technical

          # WASM chatbot as landing page
          cp docs/chat/index.html pages/index.html
          cp -r crates/wasm/pkg/* pages/pkg/

          # Presentation under /decks/technical
          cp docs/presentations/index.html pages/decks/technical/index.html

          # Logos
          cp docs/praxis-logo-dark.jpg pages/praxis-logo-dark.jpg
          cp docs/praxis-logo-light.jpg pages/praxis-logo-light.jpg
          cp docs/praxis-logo-video-dark.mp4 pages/praxis-logo-video-dark.mp4
          cp docs/praxis-logo-video-light.mp4 pages/praxis-logo-video-light.mp4

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: needs.build.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
