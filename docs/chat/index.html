<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pr4xis — Axiomatic Intelligence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header img { height: 40px; }
    header h1 { color: #58a6ff; font-size: 1.4em; font-weight: 600; }
    header span { color: #8b949e; font-size: 0.85em; }
    #status {
      padding: 0.3rem 0.8rem;
      border-radius: 12px;
      font-size: 0.75em;
      font-weight: 600;
      margin-left: auto;
    }
    .loading { background: #d29922; color: #0d1117; }
    .ready { background: #3fb950; color: #0d1117; }
    .error { background: #f85149; color: #0d1117; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .message {
      max-width: 80%;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 0.95em;
    }
    .user {
      align-self: flex-end;
      background: #1f6feb;
      color: #fff;
      margin-top: 0.5rem;
    }
    .user::before {
      content: '→ ';
      opacity: 0.6;
    }
    .system {
      align-self: flex-start;
      background: #0d1f0d;
      border: 1px solid #238636;
      color: #e6edf3;
    }
    .system::before {
      content: '← ';
      opacity: 0.6;
    }
    .system.fallback {
      background: #161b22;
      border-color: #58a6ff;
      color: #79c0ff;
      font-style: italic;
    }
    .info {
      align-self: center;
      color: #8b949e;
      font-size: 0.8em;
      font-style: italic;
    }

    /* Trace: attached below each response, pulls down like accordion */
    .trace-toggle {
      align-self: flex-start;
      background: none;
      border: none;
      color: #484f58;
      font-size: 0.7em;
      cursor: pointer;
      padding: 0.2rem 0;
      margin-left: 0.5rem;
    }
    .trace-toggle:hover { color: #7ee787; }
    .trace-toggle.open { color: #7ee787; }
    .trace-panel {
      max-width: 100%;
      display: none;
      border-top: 1px solid #21262d;
      margin-top: 0.5em;
      font-family: monospace;
      font-size: 0.72em;
      color: #8b949e;
      white-space: pre-wrap;
      word-break: break-all;
      padding: 0.5rem 0;
    }
    .trace-panel.open {
      display: block;
    }
    .trace-panel .step { color: #8b949e; margin-left: 0.5em; }
    .trace-panel .step::before { content: '├─ '; color: #30363d; }
    .trace-panel .step:last-child::before { content: '└─ '; color: #30363d; }

    #input-area {
      padding: 1rem 2rem;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 0.8rem;
    }
    #input {
      flex: 1;
      padding: 0.7rem 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 1em;
      font-family: inherit;
      outline: none;
    }
    #input:focus { border-color: #58a6ff; }
    #input::placeholder { color: #484f58; }

    /* Tab bar */
    .tabs { display: flex; border-bottom: 1px solid #21262d; }
    .tab {
      padding: 0.6rem 1.5rem; background: none; border: none; border-bottom: 2px solid transparent;
      color: #8b949e; font-size: 0.9em; cursor: pointer; font-weight: 600;
    }
    .tab:hover { color: #c9d1d9; }
    .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    .tab-content { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* Dashboard */
    #dashboard { padding: 1.5rem 2rem; gap: 1rem; }
    .dash-summary {
      display: flex; gap: 1.5rem; flex-wrap: wrap; padding-bottom: 1rem;
      border-bottom: 1px solid #21262d;
    }
    .dash-stat {
      text-align: center; min-width: 100px;
    }
    .dash-stat .value { font-size: 2em; font-weight: 700; color: #58a6ff; }
    .dash-stat .label { font-size: 0.75em; color: #8b949e; text-transform: uppercase; }
    .dash-group { margin-top: 1rem; }
    .dash-group-title {
      font-size: 0.85em; font-weight: 600; color: #7ee787; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 0.5rem;
    }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.5rem; }
    .ont-card {
      background: #161b22; border: 1px solid #21262d; border-radius: 8px;
      padding: 0.7rem 1rem; cursor: default; transition: border-color 0.15s;
    }
    .ont-card:hover { border-color: #58a6ff; }
    .ont-card .name { font-weight: 600; color: #c9d1d9; font-size: 0.9em; }
    .ont-card .domain { color: #484f58; font-size: 0.7em; font-family: monospace; }
    .ont-card .counts { color: #8b949e; font-size: 0.75em; margin-top: 0.3rem; }
    .ont-card .source { color: #484f58; font-size: 0.65em; font-style: italic; margin-top: 0.2rem; }
    .badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px;
      font-size: 0.65em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .badge-embedded { background: #1f6feb33; color: #58a6ff; border: 1px solid #1f6feb; }
    .badge-codegen { background: #23863633; color: #3fb950; border: 1px solid #238636; }

    #send {
      padding: 0.7rem 1.5rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      font-weight: 600;
    }
    #send:hover { background: #2ea043; }
    #send:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <img src="./praxis-logo-dark.jpg" alt="Pr4xis" onerror="this.style.display='none'">
    <h1>Pr4xis</h1>
    <span>Axiomatic intelligence — runs entirely in your browser</span>
    <div id="status" class="loading">Loading...</div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="chat-tab">Chat</button>
    <button class="tab" data-tab="dashboard">Dashboard</button>
  </div>

  <div id="chat-tab" class="tab-content active">
    <div id="chat" style="flex:1;overflow-y:auto;padding:1.5rem 2rem 3rem;display:flex;flex-direction:column;gap:0.5rem;">
      <div class="message info">Loading English ontology (107,000 concepts)...</div>
    </div>
  </div>

  <div id="dashboard" class="tab-content">
    <div class="message info">Loading ontology inventory...</div>
  </div>

  <div id="input-area">
    <input type="text" id="input" placeholder="Ask something... (try: is a dog a mammal?)" disabled>
    <button id="send" disabled>Send</button>
  </div>

  <script type="module">
    import init, { Pr4xis } from './pkg/pr4xis_wasm.js';

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const status = document.getElementById('status');

    let pr4xis = null;

    function addMessage(text, cls) {
      const div = document.createElement('div');
      div.className = `message ${cls}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function addTraceAccordion(trace) {
      const btn = document.createElement('button');
      btn.className = 'trace-toggle';
      btn.textContent = '▶ pipeline';

      const panel = document.createElement('div');
      panel.className = 'trace-panel';

      // Parse "status:ontology:action:detail | ..." into colored rows
      // Response ontologies (NLG, Content Determination, Realization) use ←
      const responseSteps = new Set(['Metacognition', 'Pragmatics (Searle)', 'Pragmatics', 'NLG (Reiter-Dale)', 'Document Planning (RST)', 'SVO Grammar', 'Content Determination']);

      const parts = trace.split(' | ');
      // Add request header at start
      const reqHeader = document.createElement('div');
      reqHeader.style.cssText = 'border-top:1px dashed #30363d; margin:0.3em 0; padding-top:0.2em; color:#484f58; font-size:0.9em;';
      reqHeader.textContent = '── request ──';
      panel.appendChild(reqHeader);

      let lastDirection = '→';
      for (const part of parts) {
        const fields = part.split(':');
        const row = document.createElement('div');
        row.className = 'step';
        if (fields.length >= 4) {
          const status = fields[0].trim();
          const ontology = fields[1].trim();
          const action = fields[2].trim();
          const detail = fields.slice(3).join(':').trim();

          // Direction: input pipeline → , response pipeline ←
          const isResponse = responseSteps.has(ontology);
          const direction = isResponse ? '←' : '→';

          // Add separator when direction changes
          if (direction !== lastDirection) {
            const sep = document.createElement('div');
            sep.style.cssText = 'border-top:1px dashed #30363d; margin:0.3em 0; padding-top:0.2em; color:#484f58; font-size:0.9em;';
            sep.textContent = isResponse ? '── response ──' : '── input ──';
            panel.appendChild(sep);
            lastDirection = direction;
          }

          const dirEl = document.createElement('span');
          dirEl.style.color = '#484f58';
          dirEl.textContent = direction + ' ';

          const lineColor = status === 'warn' ? '#d29922' : status === 'err' ? '#f85149' : '#8b949e';

          const ontEl = document.createElement('span');
          ontEl.style.fontWeight = '600';
          ontEl.style.color = lineColor;
          ontEl.textContent = ontology;

          const actEl = document.createElement('span');
          actEl.style.color = lineColor;
          actEl.textContent = ` → ${action}: `;

          const detEl = document.createElement('span');
          detEl.style.color = lineColor;
          detEl.textContent = detail;

          row.appendChild(dirEl);
          row.appendChild(ontEl);
          row.appendChild(actEl);
          row.appendChild(detEl);
        } else {
          row.textContent = part;
        }
        panel.appendChild(row);
      }

      btn.addEventListener('click', () => {
        const isOpen = panel.classList.toggle('open');
        btn.classList.toggle('open', isOpen);
        btn.textContent = isOpen ? '▼ pipeline' : '▶ pipeline';
        if (isOpen) {
          // Scroll the panel into view after it appears
          requestAnimationFrame(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }));
        }
      });

      // Return the elements for embedding inside the response bubble
      return { btn, panel };
    }

    async function initialize() {
      try {
        await init();
        pr4xis = new Pr4xis();
        status.textContent = `${pr4xis.concept_count().toLocaleString()} concepts`;
        status.className = 'ready';
        addMessage(
          `pr4xis — axiomatic intelligence\n` +
          `  ${pr4xis.concept_count().toLocaleString()} concepts, ${pr4xis.word_count().toLocaleString()} words\n` +
          `  running entirely in your browser — no server`,
          'info'
        );
        await renderDashboard(pr4xis);
        input.disabled = false;
        send.disabled = false;
        input.focus();
      } catch (e) {
        status.textContent = 'Error';
        status.className = 'error';
        addMessage(`Failed to load: ${e}`, 'info');
      }
    }

    function handleSend() {
      const text = input.value.trim();
      if (!text || !pr4xis) return;

      addMessage(text, 'user');
      input.value = '';

      const t0 = performance.now();
      const raw = pr4xis.chat(text);
      const elapsed = performance.now() - t0;
      try {
        const result = JSON.parse(raw);
        const dur = elapsed < 1 ? `${(elapsed * 1000).toFixed(0)}µs` : `${elapsed.toFixed(1)}ms`;
        const msgDiv = addMessage(result.response, result.from_ontology === false ? 'system fallback' : 'system');
        // Embed trace + stats INSIDE the response bubble
        if (result.trace) {
          const { btn, panel } = addTraceAccordion(result.trace);
          msgDiv.appendChild(btn);
          msgDiv.appendChild(panel);
        }
        const statsEl = document.createElement('div');
        statsEl.style.cssText = 'margin-top:0.5em; font-size:0.7em; color:#484f58; border-top:1px solid #21262d; padding-top:0.3em;';
        const ontCount = result.ontology_count || '?';
        statsEl.textContent = `${result.token_count} tokens · ${ontCount} ontologies · ${dur} · in-browser`;
        msgDiv.appendChild(statsEl);
      } catch {
        addMessage(raw, 'system');
      }
      input.focus();
    }

    // Tab switching
    const inputArea = document.getElementById('input-area');
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
        inputArea.style.display = tab.dataset.tab === 'chat-tab' ? 'flex' : 'none';
      });
    });

    async function renderDashboard(pr4xis) {
      const raw = pr4xis.self_describe();
      let data;
      try { data = JSON.parse(raw); } catch { return; }

      const dash = document.getElementById('dashboard');
      dash.innerHTML = '';

      // Fetch WASM binary size
      let wasmSize = '?';
      try {
        const resp = await fetch('./pkg/pr4xis_wasm_bg.wasm', { method: 'HEAD' });
        const bytes = parseInt(resp.headers.get('content-length') || '0', 10);
        if (bytes > 0) wasmSize = (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      } catch { /* offline or CORS — leave as ? */ }

      // Summary bar
      const summary = document.createElement('div');
      summary.className = 'dash-summary';
      [
        { value: data.ontology_count, label: 'ontologies' },
        { value: data.total_concepts.toLocaleString(), label: 'concepts' },
        { value: data.total_morphisms.toLocaleString(), label: 'morphisms' },
        { value: wasmSize, label: 'wasm binary' },
        { value: data.version, label: 'version' },
        { value: data.awareness, label: 'awareness' },
      ].forEach(({ value, label }) => {
        const stat = document.createElement('div');
        stat.className = 'dash-stat';
        stat.innerHTML = `<div class="value">${value}</div><div class="label">${label}</div>`;
        summary.appendChild(stat);
      });

      // Deployment badges + note
      const badges = document.createElement('div');
      badges.style.cssText = 'display:flex; gap:0.5rem; flex-wrap:wrap; padding-top:0.8rem; align-items:center;';
      badges.innerHTML =
        '<span class="badge badge-embedded">embedded in binary</span>' +
        '<span class="badge badge-codegen">build-time codegen</span>' +
        '<span class="badge badge-embedded">no server — runs in your browser</span>';
      summary.appendChild(badges);

      const note = document.createElement('div');
      note.style.cssText = 'color:#484f58; font-size:0.75em; padding-top:0.5rem;';
      note.textContent = 'Structural definitions compiled into the WASM binary. ' +
        'Concept/morphism counts reflect the category structure. ' +
        'English WordNet (107k synsets) loaded via build-time codegen from the upstream Global WordNet Association release.';
      summary.appendChild(note);

      dash.appendChild(summary);

      // Group ontologies by DOLCE being
      const groups = {};
      for (const o of data.ontologies) {
        const key = o.being || 'unclassified';
        if (!groups[key]) groups[key] = [];
        groups[key].push(o);
      }

      // Render each group
      const beingOrder = ['Abstract', 'Social', 'Mental', 'Physical', 'Process', 'Event', 'Quality', 'unclassified'];
      for (const being of beingOrder) {
        const onts = groups[being];
        if (!onts || onts.length === 0) continue;

        const group = document.createElement('div');
        group.className = 'dash-group';

        const title = document.createElement('div');
        title.className = 'dash-group-title';
        title.textContent = `${being} (${onts.length})`;
        group.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'dash-grid';

        for (const o of onts.sort((a, b) => a.name.localeCompare(b.name))) {
          const card = document.createElement('div');
          card.className = 'ont-card';
          card.innerHTML =
            `<div class="name">${o.name}</div>` +
            `<div class="domain">${o.domain}</div>` +
            `<div class="counts">${o.concepts} concepts · ${o.morphisms} morphisms</div>` +
            `<div class="source">${o.source}</div>`;
          grid.appendChild(card);
        }
        group.appendChild(grid);
        dash.appendChild(group);
      }
    }

    send.addEventListener('click', handleSend);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSend();
    });

    initialize();
  </script>
</body>
</html>
