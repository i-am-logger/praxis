<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Praxis — Axiomatic Intelligence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header img { height: 40px; }
    header h1 { color: #58a6ff; font-size: 1.4em; font-weight: 600; }
    header span { color: #8b949e; font-size: 0.85em; }
    #status {
      padding: 0.3rem 0.8rem;
      border-radius: 12px;
      font-size: 0.75em;
      font-weight: 600;
      margin-left: auto;
    }
    .loading { background: #d29922; color: #0d1117; }
    .ready { background: #3fb950; color: #0d1117; }
    .error { background: #f85149; color: #0d1117; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 80%;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 0.95em;
    }
    .user {
      align-self: flex-end;
      background: #1f6feb;
      color: #fff;
    }
    .system {
      align-self: flex-start;
      background: #161b22;
      border: 1px solid #30363d;
    }
    .info {
      align-self: center;
      color: #8b949e;
      font-size: 0.85em;
      font-style: italic;
    }
    .trace {
      align-self: flex-start;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 0.5rem 0.8rem;
      font-family: monospace;
      font-size: 0.75em;
      color: #7ee787;
      max-width: 90%;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .trace summary { cursor: pointer; color: #8b949e; }
    .trace .step { margin-left: 1em; color: #79c0ff; }
    .trace .step::before { content: '├─ '; color: #484f58; }
    .trace .step:last-child::before { content: '└─ '; color: #484f58; }

    #input-area {
      padding: 1rem 2rem;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 0.8rem;
    }
    #input {
      flex: 1;
      padding: 0.7rem 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 1em;
      font-family: inherit;
      outline: none;
    }
    #input:focus { border-color: #58a6ff; }
    #input::placeholder { color: #484f58; }
    #send {
      padding: 0.7rem 1.5rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      font-weight: 600;
    }
    #send:hover { background: #2ea043; }
    #send:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <img src="logo.jpg" alt="Praxis" onerror="this.style.display='none'">
    <h1>Praxis</h1>
    <span>Axiomatic intelligence — runs entirely in your browser</span>
    <div id="status" class="loading">Loading...</div>
  </header>

  <div id="chat">
    <div class="message info">Loading English ontology (107,000 concepts)...</div>
  </div>

  <div id="input-area">
    <input type="text" id="input" placeholder="Ask something... (try: is a dog a mammal?)" disabled>
    <button id="send" disabled>Send</button>
    <label style="color:#8b949e;font-size:0.8em;display:flex;align-items:center;gap:4px;cursor:pointer">
      <input type="checkbox" id="debug"> debug
    </label>
  </div>

  <script type="module">
    import init, { Praxis } from './pkg/praxis_wasm.js';
    // pkg/ is copied from crates/wasm/pkg/ during build

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const status = document.getElementById('status');

    let praxis = null;

    function addMessage(text, cls) {
      const div = document.createElement('div');
      div.className = `message ${cls}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTrace(trace) {
      const parts = trace.split(' | ');
      const details = document.createElement('details');
      details.className = 'message trace';
      const summary = document.createElement('summary');
      summary.textContent = 'pipeline trace';
      details.appendChild(summary);
      for (const part of parts) {
        const step = document.createElement('div');
        step.className = 'step';
        step.textContent = part;
        details.appendChild(step);
      }
      chat.appendChild(details);
      chat.scrollTop = chat.scrollHeight;
      return details;
    }

    async function initialize() {
      try {
        await init();
        praxis = new Praxis();
        status.textContent = `${praxis.concept_count().toLocaleString()} concepts`;
        status.className = 'ready';
        addMessage(
          `praxis — axiomatic intelligence\n` +
          `  ${praxis.concept_count().toLocaleString()} concepts, ${praxis.word_count().toLocaleString()} words\n` +
          `  running entirely in your browser — no server`,
          'info'
        );
        input.disabled = false;
        send.disabled = false;
        input.focus();
      } catch (e) {
        status.textContent = 'Error';
        status.className = 'error';
        addMessage(`Failed to load: ${e}`, 'info');
      }
    }

    const debugCheckbox = document.getElementById('debug');

    function handleSend() {
      const text = input.value.trim();
      if (!text || !praxis) return;

      addMessage(text, 'user');
      input.value = '';

      const raw = praxis.chat(text);
      try {
        const result = JSON.parse(raw);
        const dur = result.duration_us < 1000
          ? `${result.duration_us}µs`
          : `${(result.duration_us / 1000).toFixed(1)}ms`;
        addMessage(result.response, 'system');
        addMessage(
          `${result.token_count} tokens · ${dur} · single thread\nin-browser · no server · no AI`,
          'info'
        );
        if (result.trace) {
          const traceEl = addTrace(result.trace);
          traceEl.style.display = debugCheckbox.checked ? '' : 'none';
        }
      } catch {
        addMessage(raw, 'system');
      }
      input.focus();
    }

    // Toggle all trace elements when debug checkbox changes
    debugCheckbox.addEventListener('change', () => {
      document.querySelectorAll('.trace').forEach(el => {
        el.style.display = debugCheckbox.checked ? '' : 'none';
      });
    });

    send.addEventListener('click', handleSend);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSend();
    });

    initialize();
  </script>
</body>
</html>
