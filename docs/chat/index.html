<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pr4xis — Axiomatic Intelligence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header img { height: 40px; }
    header h1 { color: #58a6ff; font-size: 1.4em; font-weight: 600; }
    header span { color: #8b949e; font-size: 0.85em; }
    #status {
      padding: 0.3rem 0.8rem;
      border-radius: 12px;
      font-size: 0.75em;
      font-weight: 600;
      margin-left: auto;
    }
    .loading { background: #d29922; color: #0d1117; }
    .ready { background: #3fb950; color: #0d1117; }
    .error { background: #f85149; color: #0d1117; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .message {
      max-width: 80%;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 0.95em;
    }
    .user {
      align-self: flex-end;
      background: #1f6feb;
      color: #fff;
      margin-top: 0.5rem;
    }
    .user::before {
      content: '→ ';
      opacity: 0.6;
    }
    .system {
      align-self: flex-start;
      background: #0d1f0d;
      border: 1px solid #238636;
      color: #e6edf3;
    }
    .system::before {
      content: '← ';
      opacity: 0.6;
    }
    .system.fallback {
      background: #161b22;
      border-color: #58a6ff;
      color: #79c0ff;
      font-style: italic;
    }
    .info {
      align-self: center;
      color: #8b949e;
      font-size: 0.8em;
      font-style: italic;
    }

    /* Trace: attached below each response, pulls down like accordion */
    .trace-toggle {
      align-self: flex-start;
      background: none;
      border: none;
      color: #484f58;
      font-size: 0.7em;
      cursor: pointer;
      padding: 0.2rem 0;
      margin-left: 0.5rem;
    }
    .trace-toggle:hover { color: #7ee787; }
    .trace-toggle.open { color: #7ee787; }
    .trace-panel {
      max-width: 100%;
      display: none;
      border-top: 1px solid #21262d;
      margin-top: 0.5em;
      font-family: monospace;
      font-size: 0.72em;
      color: #8b949e;
      white-space: pre-wrap;
      word-break: break-all;
      padding: 0.5rem 0;
    }
    .trace-panel.open {
      display: block;
    }
    .trace-panel .step { color: #8b949e; margin-left: 0.5em; }
    .trace-panel .step::before { content: '├─ '; color: #30363d; }
    .trace-panel .step:last-child::before { content: '└─ '; color: #30363d; }

    #input-area {
      padding: 1rem 2rem;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 0.8rem;
    }
    #input {
      flex: 1;
      padding: 0.7rem 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 1em;
      font-family: inherit;
      outline: none;
    }
    #input:focus { border-color: #58a6ff; }
    #input::placeholder { color: #484f58; }
    #send {
      padding: 0.7rem 1.5rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      font-weight: 600;
    }
    #send:hover { background: #2ea043; }
    #send:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <img src="./praxis-logo-dark.jpg" alt="Pr4xis" onerror="this.style.display='none'">
    <h1>Pr4xis</h1>
    <span>Axiomatic intelligence — runs entirely in your browser</span>
    <div id="status" class="loading">Loading...</div>
  </header>

  <div id="chat">
    <div class="message info">Loading English ontology (107,000 concepts)...</div>
  </div>

  <div id="input-area">
    <input type="text" id="input" placeholder="Ask something... (try: is a dog a mammal?)" disabled>
    <button id="send" disabled>Send</button>
  </div>

  <script type="module">
    import init, { Pr4xis } from './pkg/pr4xis_wasm.js';

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const status = document.getElementById('status');

    let pr4xis = null;

    function addMessage(text, cls) {
      const div = document.createElement('div');
      div.className = `message ${cls}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function addTraceAccordion(trace) {
      const btn = document.createElement('button');
      btn.className = 'trace-toggle';
      btn.textContent = '▶ pipeline';

      const panel = document.createElement('div');
      panel.className = 'trace-panel';

      // Parse "status:ontology:action:detail | ..." into colored rows
      // Response ontologies (NLG, Content Determination, Realization) use ←
      const responseSteps = new Set(['Metacognition', 'Pragmatics (Searle)', 'Pragmatics', 'NLG (Reiter-Dale)', 'Document Planning (RST)', 'SVO Grammar', 'Content Determination']);

      const parts = trace.split(' | ');
      // Add request header at start
      const reqHeader = document.createElement('div');
      reqHeader.style.cssText = 'border-top:1px dashed #30363d; margin:0.3em 0; padding-top:0.2em; color:#484f58; font-size:0.9em;';
      reqHeader.textContent = '── request ──';
      panel.appendChild(reqHeader);

      let lastDirection = '→';
      for (const part of parts) {
        const fields = part.split(':');
        const row = document.createElement('div');
        row.className = 'step';
        if (fields.length >= 4) {
          const status = fields[0].trim();
          const ontology = fields[1].trim();
          const action = fields[2].trim();
          const detail = fields.slice(3).join(':').trim();

          // Direction: input pipeline → , response pipeline ←
          const isResponse = responseSteps.has(ontology);
          const direction = isResponse ? '←' : '→';

          // Add separator when direction changes
          if (direction !== lastDirection) {
            const sep = document.createElement('div');
            sep.style.cssText = 'border-top:1px dashed #30363d; margin:0.3em 0; padding-top:0.2em; color:#484f58; font-size:0.9em;';
            sep.textContent = isResponse ? '── response ──' : '── input ──';
            panel.appendChild(sep);
            lastDirection = direction;
          }

          const dirEl = document.createElement('span');
          dirEl.style.color = '#484f58';
          dirEl.textContent = direction + ' ';

          const lineColor = status === 'warn' ? '#d29922' : status === 'err' ? '#f85149' : '#8b949e';

          const ontEl = document.createElement('span');
          ontEl.style.fontWeight = '600';
          ontEl.style.color = lineColor;
          ontEl.textContent = ontology;

          const actEl = document.createElement('span');
          actEl.style.color = lineColor;
          actEl.textContent = ` → ${action}: `;

          const detEl = document.createElement('span');
          detEl.style.color = lineColor;
          detEl.textContent = detail;

          row.appendChild(dirEl);
          row.appendChild(ontEl);
          row.appendChild(actEl);
          row.appendChild(detEl);
        } else {
          row.textContent = part;
        }
        panel.appendChild(row);
      }

      btn.addEventListener('click', () => {
        const isOpen = panel.classList.toggle('open');
        btn.classList.toggle('open', isOpen);
        btn.textContent = isOpen ? '▼ pipeline' : '▶ pipeline';
        if (isOpen) {
          // Scroll the panel into view after it appears
          requestAnimationFrame(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }));
        }
      });

      // Return the elements for embedding inside the response bubble
      return { btn, panel };
    }

    async function initialize() {
      try {
        await init();
        pr4xis = new Pr4xis();
        status.textContent = `${pr4xis.concept_count().toLocaleString()} concepts`;
        status.className = 'ready';
        addMessage(
          `pr4xis — axiomatic intelligence\n` +
          `  ${pr4xis.concept_count().toLocaleString()} concepts, ${pr4xis.word_count().toLocaleString()} words\n` +
          `  running entirely in your browser — no server`,
          'info'
        );
        input.disabled = false;
        send.disabled = false;
        input.focus();
      } catch (e) {
        status.textContent = 'Error';
        status.className = 'error';
        addMessage(`Failed to load: ${e}`, 'info');
      }
    }

    function handleSend() {
      const text = input.value.trim();
      if (!text || !pr4xis) return;

      addMessage(text, 'user');
      input.value = '';

      const t0 = performance.now();
      const raw = pr4xis.chat(text);
      const elapsed = performance.now() - t0;
      try {
        const result = JSON.parse(raw);
        const dur = elapsed < 1 ? `${(elapsed * 1000).toFixed(0)}µs` : `${elapsed.toFixed(1)}ms`;
        const msgDiv = addMessage(result.response, result.from_ontology === false ? 'system fallback' : 'system');
        // Embed trace + stats INSIDE the response bubble
        if (result.trace) {
          const { btn, panel } = addTraceAccordion(result.trace);
          msgDiv.appendChild(btn);
          msgDiv.appendChild(panel);
        }
        const statsEl = document.createElement('div');
        statsEl.style.cssText = 'margin-top:0.5em; font-size:0.7em; color:#484f58; border-top:1px solid #21262d; padding-top:0.3em;';
        const ontCount = result.ontology_count || '?';
        statsEl.textContent = `${result.token_count} tokens · ${ontCount} ontologies · ${dur} · in-browser`;
        msgDiv.appendChild(statsEl);
      } catch {
        addMessage(raw, 'system');
      }
      input.focus();
    }

    send.addEventListener('click', handleSend);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSend();
    });

    initialize();
  </script>
</body>
</html>
